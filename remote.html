<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aurora · Scan to control</title>
  <style>
    :root { --bg:#0b0d10; --ink:#f4ede1; --muted:rgba(244,237,225,.6); --accent:#d9a441; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--ink);
      font-family: system-ui, -apple-system, sans-serif; text-align: center;
      padding: 24px;
    }
    .card { max-width: 420px; }
    .brand { letter-spacing: .28em; font-weight: 800; font-size: 13px; margin: 0 0 8px; }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: -0.02em; }
    p { margin: 0 0 20px; color: var(--muted); line-height: 1.5; }
    img {
      width: min(280px, 70vw); height: auto; background: #fff;
      border-radius: 16px; padding: 14px; display: block; margin: 0 auto 18px;
    }
    a {
      color: var(--accent); font-weight: 600; word-break: break-all;
      text-decoration: none; font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">AURORA</p>
    <h1>Stage remote</h1>
    <p>Scan with your phone to open the control buttons for the live presentation.</p>
    <img src="assets/qr/control.png" width="280" height="280" alt="QR code to Aurora stage remote">
    <a id="ctrlUrl" href="control.html">https://web-production-7e14a.up.railway.app/control.html</a>
  </div>
  <script>
    const a = document.getElementById("ctrlUrl");
    const url = `${location.origin}/control.html`;
    a.href = url;
    a.textContent = url;
  </script>
</body>
</html>
